<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, system-ui, -apple-system, sans-serif;
    font-size: 12px;
    color: #e8e8e8;
    background: #2c2c2c;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .header {
    padding: 12px 14px 8px;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    border-bottom: 1px solid #3a3a3a;
    background: #333;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header .settings-btn {
    background: none; border: none; color: #999;
    cursor: pointer; font-size: 16px; padding: 0 4px; line-height: 1;
  }
  .header .settings-btn:hover { color: #fff; }

  .view { display: none; flex-direction: column; flex: 1; min-height: 0; }
  .view.active { display: flex; }

  /* Script List */
  .script-list { padding: 6px; overflow-y: auto; flex: 1; }
  .script-item {
    display: flex; align-items: center; gap: 10px; padding: 10px;
    border-radius: 6px; cursor: pointer; transition: background 0.15s;
  }
  .script-item:hover { background: #3a3a3a; }
  .script-item:active { background: #444; }
  .script-info { flex: 1; min-width: 0; }
  .script-name { font-size: 12px; font-weight: 600; color: #fff; }
  .script-desc { font-size: 11px; color: #999; margin-top: 2px; }
  .script-icon {
    width: 32px; height: 32px; border-radius: 6px; background: #0d99ff;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .empty { padding: 40px 14px; text-align: center; color: #666; font-size: 12px; }

  /* Settings */
  .settings-content { padding: 14px; flex: 1; overflow-y: auto; }
  .settings-section { margin-bottom: 16px; }
  .settings-section-title {
    font-size: 11px; font-weight: 700; color: #0d99ff; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 8px;
  }
  .settings-label { font-size: 11px; font-weight: 600; color: #ccc; margin-bottom: 4px; display: block; }
  .settings-hint { font-size: 10px; color: #777; margin-bottom: 8px; line-height: 1.4; }
  .settings-input, .settings-select {
    width: 100%; padding: 7px 10px; background: #1e1e1e; border: 1px solid #444;
    border-radius: 4px; color: #e8e8e8; font-size: 12px; font-family: 'SF Mono', monospace;
    outline: none; margin-bottom: 8px;
  }
  .settings-input:focus, .settings-select:focus { border-color: #0d99ff; }
  .settings-select { font-family: inherit; cursor: pointer; -webkit-appearance: none; appearance: none; }
  .settings-current {
    margin-top: 4px; padding: 6px 10px; background: #1a1a1a; border-radius: 4px;
    font-size: 11px; color: #4ec9b0; font-family: 'SF Mono', monospace;
    word-break: break-all; margin-bottom: 8px;
  }
  .settings-toggle {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer;
  }
  .settings-toggle input { cursor: pointer; }
  .settings-toggle span { font-size: 12px; color: #ccc; }
  .provider-section { display: none; }
  .provider-section.active { display: block; }
  .fetch-btn {
    background: #444; border: 1px solid #555; color: #ccc; padding: 4px 10px;
    border-radius: 4px; cursor: pointer; font-size: 10px; font-family: inherit;
    margin-left: 8px;
  }
  .fetch-btn:hover { background: #555; color: #fff; }
  .settings-actions {
    padding: 10px 14px; border-top: 1px solid #3a3a3a; display: flex; gap: 8px;
  }
  .save-btn {
    background: #0d99ff; border: none; color: #fff; padding: 6px 16px;
    border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; font-family: inherit;
  }
  .save-btn:hover { background: #0b87e0; }
  .cancel-btn {
    background: none; border: 1px solid #555; color: #ccc; padding: 6px 16px;
    border-radius: 4px; cursor: pointer; font-size: 11px; font-family: inherit;
  }
  .cancel-btn:hover { background: #444; }

  /* JSON Output */
  .json-toolbar {
    display: flex; align-items: center; gap: 6px; padding: 8px 12px;
    border-bottom: 1px solid #3a3a3a; background: #333; flex-shrink: 0;
  }
  .json-toolbar .back-btn {
    background: none; border: 1px solid #555; color: #ccc; padding: 4px 10px;
    border-radius: 4px; cursor: pointer; font-size: 11px; font-family: inherit;
  }
  .json-toolbar .back-btn:hover { background: #444; color: #fff; }
  .json-stats { flex: 1; font-size: 11px; color: #999; text-align: center; }
  .json-toolbar .copy-btn {
    background: #0d99ff; border: none; color: #fff; padding: 5px 14px;
    border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600;
    font-family: inherit; transition: background 0.15s;
  }
  .json-toolbar .copy-btn:hover { background: #0b87e0; }
  .json-toolbar .copy-btn.copied { background: #4ec9b0; }
  .json-toolbar .zip-btn {
    background: #4ec9b0; border: none; color: #1e1e1e; padding: 5px 10px;
    border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600;
    font-family: inherit; transition: background 0.15s;
  }
  .json-toolbar .zip-btn:hover { background: #3db89e; }
  .json-toolbar .zip-btn:disabled { background: #555; color: #888; cursor: default; }
  .ai-badge {
    background: #9333ea; color: #fff; font-size: 9px; font-weight: 700;
    padding: 2px 6px; border-radius: 3px; text-transform: uppercase;
  }
  .ai-usage-bar {
    display: none; padding: 6px 12px; background: #1a1a2e; border-bottom: 1px solid #3a3a3a;
    font-size: 10px; color: #999; flex-shrink: 0;
    font-family: 'SF Mono', monospace;
  }
  .ai-usage-bar.visible { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .ai-usage-bar .usage-item { display: flex; gap: 4px; align-items: center; }
  .ai-usage-bar .usage-label { color: #666; }
  .ai-usage-bar .usage-value { color: #9333ea; font-weight: 600; }
  .ai-usage-bar .usage-cost { color: #4ec9b0; font-weight: 700; }
  .json-output { flex: 1; overflow: auto; padding: 10px 12px; background: #1e1e1e; }
  .json-output pre {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 11px; line-height: 1.5; color: #d4d4d4;
    white-space: pre-wrap; word-break: break-all;
  }

  /* Status */
  .status {
    padding: 8px 14px; font-size: 11px; color: #4ec9b0;
    border-top: 1px solid #3a3a3a; background: #2a2a2a;
    display: none; flex-shrink: 0;
  }
  .status.visible { display: block; }
  .status.error { color: #f44747; }
  .status.ai { color: #9333ea; }
</style>
</head>
<body>

<!-- View: Script List -->
<div class="view active" id="view-list">
  <div class="header">
    <span>My Toolkit</span>
    <button class="settings-btn" id="settingsBtn" title="Settings">&#9881;</button>
  </div>
  <div class="script-list" id="list"></div>
</div>

<!-- View: Settings -->
<div class="view" id="view-settings">
  <div class="header"><span>Settings</span></div>
  <div class="settings-content">

    <!-- Export Path -->
    <div class="settings-section">
      <div class="settings-section-title">Export Path</div>
      <label class="settings-label">Base folder for exports</label>
      <input class="settings-input" id="basePathInput" type="text"
        placeholder="~/projects/figma/assets" spellcheck="false" />
      <div class="settings-current" id="currentPath" style="display:none"></div>
    </div>

    <!-- AI Enrichment -->
    <div class="settings-section">
      <div class="settings-section-title">AI Enrichment</div>
      <label class="settings-toggle">
        <input type="checkbox" id="aiEnabledToggle" />
        <span>Enable AI analysis (adds summaries &amp; semantic roles)</span>
      </label>

      <div id="aiOptions" style="display:none">
        <label class="settings-label">Provider</label>
        <select class="settings-select" id="aiProviderSelect">
          <option value="ollama">Ollama (local)</option>
          <option value="gemini">Gemini (cloud)</option>
        </select>

        <!-- Ollama settings -->
        <div class="provider-section active" id="ollamaSettings">
          <div class="settings-hint" style="color:#f5a623">
            Ollama needs CORS enabled. Run in terminal:<br>
            <code style="color:#4ec9b0">launchctl setenv OLLAMA_ORIGINS "*"</code><br>
            then restart Ollama.
          </div>
          <label class="settings-label">
            Ollama URL
          </label>
          <input class="settings-input" id="ollamaUrlInput" type="text"
            value="http://localhost:11434" spellcheck="false" />
          <label class="settings-label">
            Model
            <button class="fetch-btn" id="fetchModelsBtn">Refresh</button>
          </label>
          <select class="settings-select" id="ollamaModelSelect">
            <option value="qwen2.5-coder:14b">qwen2.5-coder:14b</option>
          </select>
        </div>

        <!-- Gemini settings -->
        <div class="provider-section" id="geminiSettings">
          <label class="settings-label">API Key</label>
          <input class="settings-input" id="geminiKeyInput" type="password"
            placeholder="AIza..." spellcheck="false" />
          <label class="settings-label">
            Model
            <button class="fetch-btn" id="fetchGeminiModelsBtn">Refresh</button>
          </label>
          <select class="settings-select" id="geminiModelSelect">
            <option value="gemini-2.5-flash">gemini-2.5-flash</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div class="settings-actions">
    <button class="save-btn" id="saveSettingsBtn">Save All</button>
    <button class="cancel-btn" id="cancelSettingsBtn">Cancel</button>
  </div>
</div>

<!-- View: JSON Output -->
<div class="view" id="view-json">
  <div class="header">
    <span>Screen to JSON</span>
    <span class="ai-badge" id="aiBadge" style="display:none">AI Enriched</span>
  </div>
  <div class="json-toolbar">
    <button class="back-btn" id="backBtn">Back</button>
    <span class="json-stats" id="jsonStats"></span>
    <button class="zip-btn" id="zipBtn" disabled>Save ZIP</button>
    <button class="copy-btn" id="copyBtn">Copy JSON</button>
  </div>
  <div class="ai-usage-bar" id="aiUsageBar">
    <span class="usage-item"><span class="usage-label">Model:</span> <span class="usage-value" id="usageModel">—</span></span>
    <span class="usage-item"><span class="usage-label">Tokens:</span> <span class="usage-value" id="usageTokens">—</span></span>
    <span class="usage-item"><span class="usage-label">Time:</span> <span class="usage-value" id="usageDuration">—</span></span>
    <span class="usage-item"><span class="usage-label">Cost:</span> <span class="usage-cost" id="usageCost">—</span></span>
  </div>
  <div class="json-output" id="jsonOutput">
    <pre id="jsonPre"></pre>
  </div>
</div>

<div class="status" id="status"></div>

<script>
// ---- DOM refs ----
const list = document.getElementById('list');
const status = document.getElementById('status');
const viewList = document.getElementById('view-list');
const viewJson = document.getElementById('view-json');
const viewSettings = document.getElementById('view-settings');
const jsonPre = document.getElementById('jsonPre');
const jsonStats = document.getElementById('jsonStats');
const copyBtn = document.getElementById('copyBtn');
const zipBtn = document.getElementById('zipBtn');
const backBtn = document.getElementById('backBtn');
const settingsBtn = document.getElementById('settingsBtn');
const aiBadge = document.getElementById('aiBadge');

// Settings refs
const basePathInput = document.getElementById('basePathInput');
const currentPath = document.getElementById('currentPath');
const saveSettingsBtn = document.getElementById('saveSettingsBtn');
const cancelSettingsBtn = document.getElementById('cancelSettingsBtn');
const aiEnabledToggle = document.getElementById('aiEnabledToggle');
const aiOptions = document.getElementById('aiOptions');
const aiProviderSelect = document.getElementById('aiProviderSelect');
const ollamaSettings = document.getElementById('ollamaSettings');
const geminiSettings = document.getElementById('geminiSettings');
const ollamaUrlInput = document.getElementById('ollamaUrlInput');
const ollamaModelSelect = document.getElementById('ollamaModelSelect');
const fetchModelsBtn = document.getElementById('fetchModelsBtn');
const fetchGeminiModelsBtn = document.getElementById('fetchGeminiModelsBtn');
const aiUsageBar = document.getElementById('aiUsageBar');
const usageModel = document.getElementById('usageModel');
const usageTokens = document.getElementById('usageTokens');
const usageDuration = document.getElementById('usageDuration');
const usageCost = document.getElementById('usageCost');
const geminiKeyInput = document.getElementById('geminiKeyInput');
const geminiModelSelect = document.getElementById('geminiModelSelect');

// ---- State ----
let currentJson = '';
let currentZipBytes = null;
let currentZipFilename = 'figma-export.zip';
let savedBasePath = '';
let savedAiSettings = {
  enabled: false,
  provider: 'ollama',
  ollamaModel: 'qwen2.5-coder:14b',
  ollamaUrl: 'http://localhost:11434',
  geminiApiKey: '',
  geminiModel: 'gemini-2.0-flash',
};

// ---- Helpers ----
function showView(name) {
  viewList.className = 'view' + (name === 'list' ? ' active' : '');
  viewJson.className = 'view' + (name === 'json' ? ' active' : '');
  viewSettings.className = 'view' + (name === 'settings' ? ' active' : '');
}

function showStatus(text, isError, isAi) {
  status.textContent = text;
  status.className = 'status visible' + (isError ? ' error' : '') + (isAi ? ' ai' : '');
  if (!isAi) setTimeout(() => { status.className = 'status'; }, 3000);
}

function clearStatus() {
  status.className = 'status';
}

function syntaxHighlight(json) {
  return json
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"([^"]+)"(?=\s*:)/g, '<span style="color:#9cdcfe">"$1"</span>')
    .replace(/:\s*"([^"]*)"/g, ': <span style="color:#ce9178">"$1"</span>')
    .replace(/:\s*(\d+\.?\d*)/g, ': <span style="color:#b5cea8">$1</span>')
    .replace(/:\s*(true|false)/g, ': <span style="color:#569cd6">$1</span>')
    .replace(/:\s*(null)/g, ': <span style="color:#569cd6">$1</span>');
}

function renderScripts(scripts) {
  if (!scripts.length) {
    list.innerHTML = '<div class="empty">No scripts registered yet.</div>';
    return;
  }
  list.innerHTML = '';
  scripts.forEach((s) => {
    const item = document.createElement('div');
    item.className = 'script-item';
    item.innerHTML = `
      <div class="script-icon">${s.name.charAt(0).toUpperCase()}</div>
      <div class="script-info">
        <div class="script-name">${s.name}</div>
        <div class="script-desc">${s.description}</div>
      </div>
    `;
    item.addEventListener('click', () => {
      parent.postMessage({ pluginMessage: { type: 'run-script', scriptId: s.id } }, '*');
    });
    list.appendChild(item);
  });
}

// ---- Settings UI logic ----
function loadSettingsUI() {
  basePathInput.value = savedBasePath;
  aiEnabledToggle.checked = savedAiSettings.enabled;
  aiOptions.style.display = savedAiSettings.enabled ? 'block' : 'none';
  aiProviderSelect.value = savedAiSettings.provider;
  ollamaUrlInput.value = savedAiSettings.ollamaUrl;
  geminiKeyInput.value = savedAiSettings.geminiApiKey;
  geminiModelSelect.value = savedAiSettings.geminiModel;
  updateProviderUI();
}

function updateProviderUI() {
  const isOllama = aiProviderSelect.value === 'ollama';
  ollamaSettings.className = 'provider-section' + (isOllama ? ' active' : '');
  geminiSettings.className = 'provider-section' + (!isOllama ? ' active' : '');
}

aiEnabledToggle.addEventListener('change', () => {
  aiOptions.style.display = aiEnabledToggle.checked ? 'block' : 'none';
});

aiProviderSelect.addEventListener('change', updateProviderUI);

fetchModelsBtn.addEventListener('click', () => {
  fetchModelsBtn.textContent = '...';
  parent.postMessage({
    pluginMessage: { type: 'fetch-ollama-models', url: ollamaUrlInput.value.trim() }
  }, '*');
});

fetchGeminiModelsBtn.addEventListener('click', () => {
  const key = geminiKeyInput.value.trim();
  if (!key) { alert('Enter your Gemini API key first'); return; }
  fetchGeminiModelsBtn.textContent = '...';
  parent.postMessage({
    pluginMessage: { type: 'fetch-gemini-models', apiKey: key }
  }, '*');
});

settingsBtn.addEventListener('click', () => {
  loadSettingsUI();
  showView('settings');
});

saveSettingsBtn.addEventListener('click', () => {
  // Save base path
  const path = basePathInput.value.trim();
  parent.postMessage({ pluginMessage: { type: 'save-base-path', path } }, '*');

  // Save AI settings
  const settings = {
    enabled: aiEnabledToggle.checked,
    provider: aiProviderSelect.value,
    ollamaModel: ollamaModelSelect.value,
    ollamaUrl: ollamaUrlInput.value.trim(),
    geminiApiKey: geminiKeyInput.value.trim(),
    geminiModel: geminiModelSelect.value,
  };
  parent.postMessage({ pluginMessage: { type: 'save-ai-settings', settings } }, '*');
});

cancelSettingsBtn.addEventListener('click', () => showView('list'));

// ---- Copy / ZIP / Back ----
copyBtn.addEventListener('click', () => {
  if (!currentJson) return;
  const textarea = document.createElement('textarea');
  textarea.value = currentJson;
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand('copy');
  document.body.removeChild(textarea);
  copyBtn.textContent = 'Copied!';
  copyBtn.classList.add('copied');
  setTimeout(() => { copyBtn.textContent = 'Copy JSON'; copyBtn.classList.remove('copied'); }, 2000);
});

zipBtn.addEventListener('click', () => {
  if (!currentZipBytes) return;
  const uint8 = new Uint8Array(currentZipBytes);
  const blob = new Blob([uint8], { type: 'application/zip' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = currentZipFilename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

backBtn.addEventListener('click', () => {
  currentJson = '';
  currentZipBytes = null;
  zipBtn.disabled = true;
  zipBtn.textContent = 'Save ZIP';
  aiBadge.style.display = 'none';
  aiUsageBar.className = 'ai-usage-bar';
  jsonPre.innerHTML = '';
  clearStatus();
  showView('list');
});

// ---- Message handler ----
onmessage = (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;

  if (msg.type === 'script-list') renderScripts(msg.scripts);
  if (msg.type === 'done') showStatus('Done!', false, false);
  if (msg.type === 'error') showStatus('Error: ' + msg.message, true, false);

  // Settings loaded from storage
  if (msg.type === 'base-path') {
    savedBasePath = msg.path || '';
    if (savedBasePath) {
      currentPath.textContent = savedBasePath;
      currentPath.style.display = 'block';
    }
  }

  if (msg.type === 'ai-settings') {
    savedAiSettings = msg.settings || savedAiSettings;
  }

  if (msg.type === 'base-path-saved') {
    savedBasePath = msg.path;
    currentPath.textContent = savedBasePath;
    currentPath.style.display = savedBasePath ? 'block' : 'none';
  }

  if (msg.type === 'ai-settings-saved') {
    savedAiSettings = msg.settings;
    showView('list');
    showStatus('Settings saved!', false, false);
  }

  if (msg.type === 'show-settings') {
    loadSettingsUI();
    showView('settings');
  }

  // Ollama models fetched
  if (msg.type === 'ollama-models') {
    fetchModelsBtn.textContent = 'Refresh';
    const models = msg.models || [];
    ollamaModelSelect.innerHTML = '';
    if (models.length === 0) {
      const opt = document.createElement('option');
      opt.value = '';
      opt.textContent = 'No models found';
      ollamaModelSelect.appendChild(opt);
    } else {
      models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m;
        if (m === savedAiSettings.ollamaModel) opt.selected = true;
        ollamaModelSelect.appendChild(opt);
      });
    }
  }

  // Gemini models fetched
  if (msg.type === 'gemini-models') {
    fetchGeminiModelsBtn.textContent = 'Refresh';
    const models = msg.models || [];
    geminiModelSelect.innerHTML = '';
    if (models.length === 0) {
      const opt = document.createElement('option');
      opt.value = '';
      opt.textContent = 'No models found (check API key)';
      geminiModelSelect.appendChild(opt);
    } else {
      models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m;
        if (m === savedAiSettings.geminiModel) opt.selected = true;
        geminiModelSelect.appendChild(opt);
      });
    }
  }

  // AI status updates
  if (msg.type === 'ai-status') {
    if (msg.status === 'running') {
      showStatus('Analyzing with AI...', false, true);
      aiUsageBar.className = 'ai-usage-bar';
    }
    if (msg.status === 'done' && msg.usage) {
      clearStatus();
      const u = msg.usage;
      usageModel.textContent = u.model;
      usageTokens.textContent = u.promptTokens.toLocaleString() + ' in / ' + u.completionTokens.toLocaleString() + ' out (' + u.totalTokens.toLocaleString() + ')';
      usageDuration.textContent = (u.durationMs / 1000).toFixed(1) + 's';
      usageCost.textContent = u.estimatedCostUSD > 0 ? '$' + u.estimatedCostUSD.toFixed(6) : 'Free (local)';
      aiUsageBar.className = 'ai-usage-bar visible';
    }
    if (msg.status === 'failed') showStatus('AI enrichment failed (exported without AI)', true, false);
  }

  // ZIP ready
  if (msg.type === 'download-zip') {
    currentZipBytes = msg.bytes;
    currentZipFilename = msg.zipFilename || 'figma-export.zip';
    zipBtn.disabled = false;
    zipBtn.textContent = msg.imageCount > 0 ? 'Save ZIP (' + msg.imageCount + ' imgs)' : 'Save ZIP';
  }

  // JSON preview
  if (msg.type === 'json-output') {
    currentJson = msg.json;
    jsonPre.innerHTML = syntaxHighlight(msg.json);
    const parts = [msg.screenCount + ' screen(s)'];
    if (msg.componentCount > 0) parts.push(msg.componentCount + ' reusable');
    if (msg.imageCount > 0) parts.push(msg.imageCount + ' image(s)');
    jsonStats.textContent = parts.join(', ');

    // Show AI badge if enriched
    try {
      const parsed = JSON.parse(msg.json);
      aiBadge.style.display = parsed.aiEnriched ? 'inline' : 'none';
    } catch { aiBadge.style.display = 'none'; }

    showView('json');
  }
};
</script>
</body>
</html>
